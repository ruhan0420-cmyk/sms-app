<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="メッセージ">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>メッセージ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --safe-top:env(safe-area-inset-top); --safe-bottom:env(safe-area-inset-bottom); }

body {
  font-family:-apple-system,'Helvetica Neue',sans-serif;
  background:#f2f2f7;
  height:100dvh;
  overflow:hidden;
}

/* SCREENS */
.screen {
  display:none;
  flex-direction:column;
  height:100dvh;
  position:absolute;
  width:100%;
  top:0; left:0;
  background:#f2f2f7;
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
}
.screen.active { display:flex; transform:translateX(0); }
.screen.slide-in { transform:translateX(100%); }
.screen.slide-out { transform:translateX(-30%); }

/* NAV */
.nav {
  background:rgba(242,242,247,0.95);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding-top:max(var(--safe-top),8px);
  padding-bottom:11px;
  padding-left:16px;
  padding-right:16px;
  display:flex;
  align-items:center;
  border-bottom:0.5px solid rgba(0,0,0,0.15);
  flex-shrink:0;
  min-height:44px;
}
.nav-left { flex:1; display:flex; align-items:center; }
.nav-center { flex:2; text-align:center; }
.nav-right { flex:1; display:flex; justify-content:flex-end; align-items:center; }
.nav-title { font-size:17px; font-weight:600; color:#000; }
.nav-btn { color:#007aff; font-size:17px; cursor:pointer; user-select:none; white-space:nowrap; }
.nav-btn-bold { font-weight:600; }
.nav-back-btn {
  color:#007aff; font-size:17px; cursor:pointer; user-select:none;
  display:flex; align-items:center; gap:3px;
}
.nav-back-btn svg { width:10px; height:16px; fill:none; stroke:#007aff; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; }

/* AVATAR */
.nav-avatar-wrap { display:flex; flex-direction:column; align-items:center; gap:2px; }
.nav-avatar { width:36px; height:36px; background:#8e8e93; border-radius:50%; display:flex; align-items:center; justify-content:center; }
.nav-avatar svg { width:22px; height:22px; fill:#fff; }
.nav-phone { font-size:12px; font-weight:600; color:#000; }

/* SMS CHAT */
.chat-area {
  flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding:12px 16px 16px;
  display:flex; flex-direction:column; gap:2px;
}
.chat-area::-webkit-scrollbar { display:none; }
.date-divider { text-align:center; font-size:12px; color:#8e8e93; margin:10px 0 6px; }

.bubble-row { display:flex; align-items:flex-end; gap:6px; }
.bubble-row.received { justify-content:flex-start; }
.bubble-row.sent { justify-content:flex-end; }
.bubble-row.new { animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn { from{opacity:0;transform:scale(0.7) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }

.bubble {
  max-width:78%; padding:10px 14px; border-radius:18px;
  font-size:15px; line-height:1.46; word-break:break-word;
  cursor:pointer;
}
.bubble:active { transform:scale(0.95); transition:transform 0.1s; }
.bubble.received { background:#fff; color:#000; border-bottom-left-radius:4px; }
.bubble.sent { background:#007aff; color:#fff; border-bottom-right-radius:4px; }
.btime { font-size:11px; color:#8e8e93; white-space:nowrap; padding-bottom:2px; }
.bubble-row.sent .btime { order:-1; }
.faded { opacity:0.35; filter:blur(1.5px); pointer-events:none; }

.msg-block { max-width:78%; display:flex; flex-direction:column; }
.msg-block .bubble { border-radius:18px 18px 18px 4px; max-width:100%; }
.more-btn { background:#fff; border-top:0.5px solid #e5e5ea; padding:11px 14px; font-size:15px; color:#000; display:flex; align-items:center; justify-content:space-between; border-radius:0 0 14px 4px; cursor:pointer; }
.more-btn span { color:#c7c7cc; }

.mms-wrap { margin-top:4px; border-radius:14px; overflow:hidden; width:232px; }
.mms-visual { height:130px; background:linear-gradient(135deg,#1a0533 0%,#2d0a6b 45%,#0f0a40 100%); position:relative; overflow:hidden; display:flex; align-items:flex-end; }
.mms-visual::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 28% 65%,rgba(180,50,255,0.4) 0%,transparent 55%),radial-gradient(ellipse at 72% 35%,rgba(70,110,255,0.35) 0%,transparent 50%); }
.mms-visual::after { content:''; position:absolute; bottom:0; left:0; right:0; height:55px; background:rgba(100,20,180,0.5); clip-path:polygon(0% 100%,12% 55%,28% 72%,50% 22%,72% 60%,88% 42%,100% 65%,100% 100%); }
.mms-content { position:relative; z-index:2; padding:10px 12px; width:100%; display:flex; gap:8px; }
.mms-l { display:flex; flex-direction:column; gap:1px; }
.mms-year { color:rgba(255,255,255,0.75); font-size:9px; font-weight:500; letter-spacing:0.5px; }
.mms-title { color:#fff; font-weight:900; font-size:20px; line-height:1.05; }
.mms-gf { color:rgba(255,180,80,0.9); font-size:7.5px; letter-spacing:1.5px; margin-top:3px; }
.mms-r { margin-left:auto; display:flex; flex-direction:column; align-items:flex-end; gap:5px; }
.mms-event { color:rgba(255,220,120,0.85); font-size:8px; font-weight:600; text-align:right; line-height:1.3; }
.mms-rtitle { color:#ffd700; font-size:12px; font-weight:800; }
.mms-badge { background:rgba(180,130,255,0.85); color:#fff; font-size:8.5px; font-weight:700; padding:3px 7px; border-radius:4px; white-space:nowrap; }
.mms-label { font-size:11px; color:#8e8e93; padding:3px 4px 0; }

.input-bar {
  background:rgba(242,242,247,0.95); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-top:0.5px solid rgba(0,0,0,0.12);
  padding:10px 12px; padding-bottom:max(calc(var(--safe-bottom)+6px),16px);
  display:flex; align-items:flex-end; gap:10px; flex-shrink:0;
}
.plus-btn { color:#007aff; font-size:28px; font-weight:300; cursor:pointer; padding-bottom:3px; }
.msg-input {
  flex:1; background:#fff; border:0.5px solid #d1d1d6; border-radius:20px;
  padding:8px 14px; font-size:15px; outline:none; color:#000; font-family:inherit;
  resize:none; max-height:120px; line-height:1.4;
}
.msg-input::placeholder { color:#8e8e93; }
.send-btn { width:33px; height:33px; background:#007aff; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:transform 0.15s; }
.send-btn:active { transform:scale(0.85); }
.send-btn svg { width:14px; height:14px; }

/* PASSWORD */
.pw-screen { justify-content:center; align-items:center; gap:20px; padding:32px; }
.pw-icon { width:72px; height:72px; background:#007aff; border-radius:18px; display:flex; align-items:center; justify-content:center; }
.pw-icon svg { width:38px; height:38px; fill:#fff; }
.pw-title { font-size:22px; font-weight:700; }
.pw-sub { font-size:15px; color:#8e8e93; text-align:center; line-height:1.5; }
.pw-input { width:100%; max-width:260px; background:#fff; border:0.5px solid #d1d1d6; border-radius:12px; padding:14px; font-size:20px; text-align:center; letter-spacing:6px; outline:none; font-family:inherit; }
.pw-btn { width:100%; max-width:260px; background:#007aff; color:#fff; border-radius:12px; padding:14px; text-align:center; font-size:16px; font-weight:600; cursor:pointer; }
.pw-btn:active { opacity:0.8; }
.pw-err { color:#ff3b30; font-size:14px; min-height:18px; }

/* EDIT LIST */
.edit-list-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.edit-list-body::-webkit-scrollbar { display:none; }
.section-label { font-size:13px; color:#8e8e93; text-transform:uppercase; letter-spacing:0.3px; padding:20px 16px 6px; }
.list-card { background:#fff; border-radius:12px; margin:0 16px; overflow:hidden; }
.list-row {
  display:flex; align-items:center; padding:13px 16px;
  border-bottom:0.5px solid #f2f2f7; gap:12px; cursor:pointer;
}
.list-row:last-child { border-bottom:none; }
.list-row:active { background:#f5f5f5; }
.list-row-label { font-size:15px; color:#000; flex:1; }
.list-row-value { font-size:15px; color:#8e8e93; max-width:55%; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.list-row-arrow { color:#c7c7cc; font-size:14px; margin-left:6px; }

.msg-list-item {
  display:flex; align-items:center; padding:13px 16px;
  border-bottom:0.5px solid #f2f2f7; gap:12px; cursor:pointer;
}
.msg-list-item:active { background:#f5f5f5; }
.msg-list-item-left { flex:1; overflow:hidden; }
.msg-list-item-title { font-size:15px; color:#000; margin-bottom:2px; }
.msg-list-item-preview { font-size:13px; color:#8e8e93; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.msg-list-item-badge { font-size:12px; padding:3px 8px; border-radius:8px; font-weight:500; flex-shrink:0; }
.badge-received { background:#e8f4ff; color:#007aff; }
.badge-sent { background:#e8ffe8; color:#34c759; }

.add-row {
  display:flex; align-items:center; justify-content:center;
  padding:13px 16px; color:#007aff; font-size:15px; cursor:pointer; gap:6px;
}
.add-row:active { background:#f5f5f5; }

.apply-btn {
  margin:20px 16px; padding:15px; background:#34c759; color:#fff;
  border-radius:12px; text-align:center; font-size:16px; font-weight:600;
  cursor:pointer;
}
.apply-btn:active { opacity:0.8; }

/* DETAIL EDIT */
.detail-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:40px; }
.detail-body::-webkit-scrollbar { display:none; }
.detail-field { background:#fff; border-radius:12px; margin:0 16px; overflow:hidden; }
.detail-row { display:flex; align-items:flex-start; padding:13px 16px; border-bottom:0.5px solid #f2f2f7; gap:12px; }
.detail-row:last-child { border-bottom:none; }
.detail-label { font-size:15px; color:#8e8e93; width:48px; flex-shrink:0; padding-top:1px; }
.detail-input {
  flex:1; border:none; outline:none; font-size:15px; color:#000;
  font-family:inherit; background:transparent; padding:0;
}
.detail-textarea {
  flex:1; border:none; outline:none; font-size:15px; color:#000;
  font-family:inherit; background:transparent; resize:none; min-height:100px; line-height:1.5; padding:0;
}
.detail-input::placeholder, .detail-textarea::placeholder { color:#c7c7cc; }

.type-section { background:#fff; border-radius:12px; margin:0 16px; padding:13px 16px; display:flex; gap:10px; }
.type-pill { flex:1; padding:9px; border-radius:9px; text-align:center; font-size:15px; cursor:pointer; border:1px solid #d1d1d6; color:#8e8e93; background:#f9f9f9; transition:all 0.15s; user-select:none; }
.type-pill.active { background:#007aff; color:#fff; border-color:#007aff; font-weight:500; }

.del-btn { margin:20px 16px 0; padding:15px; background:#fff; color:#ff3b30; border-radius:12px; text-align:center; font-size:16px; cursor:pointer; border:0.5px solid #ff3b30; }
.del-btn:active { background:#fff0f0; }
</style>
</head>
<body>

<!-- PASSWORD -->
<div class="screen pw-screen" id="pwScreen">
  <div class="pw-icon"><svg viewBox="0 0 24 24"><path d="M18 8h-1V6A5 5 0 007 6v2H6a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V10a2 2 0 00-2-2zm-6 9a2 2 0 110-4 2 2 0 010 4zm3.1-9H8.9V6a3.1 3.1 0 016.2 0v2z"/></svg></div>
  <div class="pw-title">管理者ログイン</div>
  <div class="pw-sub">編集画面にアクセスするには<br>パスワードを入力してください</div>
  <input class="pw-input" type="password" id="pwInput" placeholder="••••" maxlength="8">
  <div class="pw-err" id="pwErr"></div>
  <div class="pw-btn" onclick="checkPw()">ログイン</div>
</div>

<!-- EDIT LIST -->
<div class="screen" id="editListScreen">
  <div class="nav">
    <div class="nav-left"><div class="nav-btn" onclick="showSMS()">キャンセル</div></div>
    <div class="nav-center"><span class="nav-title">編集</span></div>
    <div class="nav-right"><div class="nav-btn nav-btn-bold" onclick="applyAndShowSMS()">完了</div></div>
  </div>
  <div class="edit-list-body">
    <div class="section-label">送信者</div>
    <div class="list-card">
      <div class="list-row" onclick="openDetail('phone')">
        <span class="list-row-label">電話番号</span>
        <span class="list-row-value" id="phonePreview"></span>
        <span class="list-row-arrow">›</span>
      </div>
    </div>

    <div class="section-label">日付</div>
    <div class="list-card">
      <div class="list-row" onclick="openDetail('date')">
        <span class="list-row-label">日付</span>
        <span class="list-row-value" id="datePreview"></span>
        <span class="list-row-arrow">›</span>
      </div>
    </div>

    <div class="section-label">メッセージ</div>
    <div class="list-card" id="msgListCard">
      <div class="add-row" onclick="addMsg()">＋ メッセージを追加</div>
    </div>

    <div class="apply-btn" onclick="applyAndShowSMS()">✓ 完了してSMS画面へ</div>
    <div style="height:32px;"></div>
  </div>
</div>

<!-- DETAIL: phone / date -->
<div class="screen" id="detailScreen">
  <div class="nav">
    <div class="nav-left">
      <div class="nav-back-btn" onclick="backToList()">
        <svg viewBox="0 0 10 16"><polyline points="9,1 1,8 9,15"/></svg>
        編集
      </div>
    </div>
    <div class="nav-center"><span class="nav-title" id="detailTitle"></span></div>
    <div class="nav-right"><div class="nav-btn nav-btn-bold" onclick="saveDetail()">保存</div></div>
  </div>
  <div class="detail-body">
    <div class="section-label" id="detailSectionLabel"></div>
    <div class="detail-field">
      <div class="detail-row">
        <div class="detail-label" id="detailLabel"></div>
        <input class="detail-input" id="detailInput" type="text">
      </div>
    </div>
  </div>
</div>

<!-- MSG DETAIL -->
<div class="screen" id="msgDetailScreen">
  <div class="nav">
    <div class="nav-left">
      <div class="nav-back-btn" onclick="backToList()">
        <svg viewBox="0 0 10 16"><polyline points="9,1 1,8 9,15"/></svg>
        編集
      </div>
    </div>
    <div class="nav-center"><span class="nav-title" id="msgDetailTitle">メッセージ</span></div>
    <div class="nav-right"><div class="nav-btn nav-btn-bold" onclick="saveMsgDetail()">保存</div></div>
  </div>
  <div class="detail-body">
    <div class="section-label">種類</div>
    <div class="type-section">
      <div class="type-pill" id="typeReceived" onclick="setType('received')">受信</div>
      <div class="type-pill" id="typeSent" onclick="setType('sent')">送信</div>
    </div>

    <div class="section-label">内容</div>
    <div class="detail-field">
      <div class="detail-row">
        <textarea class="detail-textarea" id="msgDetailText" placeholder="メッセージ内容を入力"></textarea>
      </div>
    </div>

    <div class="section-label">時刻</div>
    <div class="detail-field">
      <div class="detail-row">
        <div class="detail-label">時刻</div>
        <input class="detail-input" id="msgDetailTime" type="text" placeholder="午後 5:24">
      </div>
    </div>

    <div class="del-btn" onclick="deleteMsgDetail()">このメッセージを削除</div>
  </div>
</div>

<!-- SMS SCREEN -->
<div class="screen" id="smsScreen">
  <div class="nav">
    <div class="nav-left"><div class="nav-back-btn"><svg viewBox="0 0 10 16"><polyline points="9,1 1,8 9,15"/></svg>戻る</div></div>
    <div class="nav-center">
      <div class="nav-avatar-wrap">
        <div class="nav-avatar"><svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div>
        <span class="nav-phone" id="displayPhone"></span>
      </div>
    </div>
    <div class="nav-right"><div class="nav-btn" onclick="goToEdit()">···</div></div>
  </div>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-bar">
    <div class="plus-btn">+</div>
    <textarea class="msg-input" id="msgInput" placeholder="メッセージ" rows="1"></textarea>
    <div class="send-btn" onclick="sendMsg()">
      <svg viewBox="0 0 14 14" fill="none"><path d="M7 12V2M2 7l5-5 5 5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
</div>

<script>
const PW = '1234';

let state = {
  phone: '010-●●●●-●●●5',
  date: '12月18日 木曜日',
  messages: [
    { id:1, type:'received', text:'U 1B ㅠ...', time:'午後 12:44', faded:true },
    { id:2, type:'received', text:'오늘 일괄적으로 모바일티켓(입장권 교환용) 문자 발송예정입니다. 입장권은 현장에서 신분증 확인 후 드립니다 감사합니다', time:'午後 5:24', faded:false },
    { id:3, type:'received', text:'[Web발신]\n⭐티켓 교환권은 입장권이 아닙니다. 입장권 교환 확인용 티켓입니다.\n\n[인천공항 면세점] \'별 보러 가자\' 참가 확정 안내 (KBS가요대축제 티켓 교환권)\n인천공항면세점앱 에어스타 듀티프리에서 준비한 특별 연말 선물! [2025 KBS가요대축제 글로벌 페스티벌 티켓 교환권]을 발송 드립니다. 공연 당일 [이벤트 티켓 교환 현장 부스]에서 해당 모바일 티켓 교환권을 제시하고 신분증 본인 확인 후 입장권을 교환해 드립니다. (*중요* 유효 신분증 지참)\n\n🔴 이벤트 입장권 교환 부스 안내 🔴\n▷부스 위치: 송도컨벤시아', time:'MMS 午後 6:36', faded:false, hasMMS:true, hasMore:true }
  ],
  nextId: 10
};

let editingMsgId = null;
let detailKey = null;

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.style.display = 'none';
    s.classList.remove('active');
  });
  const el = document.getElementById(id);
  el.style.display = 'flex';
  el.classList.add('active');
}

// ── PASSWORD ──
function checkPw() {
  if (document.getElementById('pwInput').value === PW) {
    document.getElementById('pwErr').textContent = '';
    renderEditList();
    showScreen('editListScreen');
  } else {
    document.getElementById('pwErr').textContent = 'パスワードが違います';
    document.getElementById('pwInput').value = '';
  }
}
document.getElementById('pwInput').addEventListener('keydown', e => { if(e.key==='Enter') checkPw(); });

// ── EDIT LIST ──
function renderEditList() {
  document.getElementById('phonePreview').textContent = state.phone;
  document.getElementById('datePreview').textContent = state.date;

  const card = document.getElementById('msgListCard');
  card.innerHTML = '';
  state.messages.forEach((msg, i) => {
    const div = document.createElement('div');
    div.className = 'msg-list-item';
    div.onclick = () => openMsgDetail(msg.id);
    const preview = msg.text.replace(/\n/g,' ').slice(0,30) + (msg.text.length>30?'…':'');
    const badgeClass = msg.type==='received' ? 'badge-received' : 'badge-sent';
    const badgeText = msg.type==='received' ? '受信' : '送信';
    div.innerHTML = `
      <div class="msg-list-item-left">
        <div class="msg-list-item-title">メッセージ ${i+1}　<span style="font-size:12px;color:#8e8e93;">${msg.time}</span></div>
        <div class="msg-list-item-preview">${preview}</div>
      </div>
      <span class="msg-list-item-badge ${badgeClass}">${badgeText}</span>
      <span style="color:#c7c7cc;font-size:14px;margin-left:4px;">›</span>
    `;
    card.appendChild(div);
  });
  const addRow = document.createElement('div');
  addRow.className = 'add-row';
  addRow.onclick = addMsg;
  addRow.innerHTML = '＋ メッセージを追加';
  card.appendChild(addRow);
}

function openDetail(key) {
  detailKey = key;
  if (key === 'phone') {
    document.getElementById('detailTitle').textContent = '電話番号';
    document.getElementById('detailSectionLabel').textContent = '送信者';
    document.getElementById('detailLabel').textContent = '番号';
    document.getElementById('detailInput').value = state.phone;
    document.getElementById('detailInput').placeholder = '010-0000-0000';
  } else {
    document.getElementById('detailTitle').textContent = '日付';
    document.getElementById('detailSectionLabel').textContent = '日付';
    document.getElementById('detailLabel').textContent = '日付';
    document.getElementById('detailInput').value = state.date;
    document.getElementById('detailInput').placeholder = '12月18日 木曜日';
  }
  showScreen('detailScreen');
  setTimeout(() => document.getElementById('detailInput').focus(), 100);
}

function saveDetail() {
  const val = document.getElementById('detailInput').value.trim();
  if (detailKey === 'phone') state.phone = val || state.phone;
  else state.date = val || state.date;
  renderEditList();
  showScreen('editListScreen');
}

function backToList() {
  renderEditList();
  showScreen('editListScreen');
}

// ── MSG DETAIL ──
function openMsgDetail(id) {
  editingMsgId = id;
  const msg = state.messages.find(m => m.id === id);
  const idx = state.messages.indexOf(msg);
  document.getElementById('msgDetailTitle').textContent = `メッセージ ${idx+1}`;
  document.getElementById('msgDetailText').value = msg.text;
  document.getElementById('msgDetailTime').value = msg.time;
  setType(msg.type);
  showScreen('msgDetailScreen');
}

function setType(type) {
  document.getElementById('typeReceived').classList.toggle('active', type==='received');
  document.getElementById('typeSent').classList.toggle('active', type==='sent');
  document.getElementById('typeReceived').dataset.val = 'received';
  document.getElementById('typeSent').dataset.val = 'sent';
  // store current selection
  document.getElementById('msgDetailScreen').dataset.type = type;
}

function saveMsgDetail() {
  const msg = state.messages.find(m => m.id === editingMsgId);
  if (!msg) return backToList();
  msg.text = document.getElementById('msgDetailText').value;
  msg.time = document.getElementById('msgDetailTime').value;
  msg.type = document.getElementById('msgDetailScreen').dataset.type || msg.type;
  backToList();
}

function deleteMsgDetail() {
  state.messages = state.messages.filter(m => m.id !== editingMsgId);
  backToList();
}

function addMsg() {
  const id = state.nextId++;
  state.messages.push({ id, type:'received', text:'', time:'午後 0:00', faded:false });
  openMsgDetail(id);
}

// ── APPLY & SMS ──
function applyAndShowSMS() { showSMS(); }

function showSMS() {
  renderSMS();
  showScreen('smsScreen');
}

function goToEdit() {
  showScreen('pwScreen');
  document.getElementById('pwInput').value = '';
  document.getElementById('pwErr').textContent = '';
}

function renderSMS() {
  document.getElementById('displayPhone').textContent = state.phone;
  const chat = document.getElementById('chatArea');
  chat.innerHTML = '';

  if (state.date) {
    const d = document.createElement('div');
    d.className = 'date-divider';
    d.textContent = state.date;
    chat.appendChild(d);
  }

  state.messages.forEach(msg => {
    const row = document.createElement('div');
    row.className = `bubble-row ${msg.type}${msg.faded?' faded':''}`;

    if (msg.hasMMS) {
      const block = document.createElement('div');
      block.className = 'msg-block';
      block.innerHTML = `
        <div class="bubble received">${msg.text.replace(/\n/g,'<br>')}</div>
        ${msg.hasMore?'<div class="more-btn">모두 보기 <span>›</span></div>':''}
        <div class="mms-wrap">
          <div class="mms-visual">
            <div class="mms-content">
              <div class="mms-l">
                <span class="mms-year">2025 KBS</span>
                <div class="mms-title">가요<br>대축제</div>
                <span class="mms-gf">GLOBAL FESTIVAL</span>
              </div>
              <div class="mms-r">
                <div class="mms-event">인천공항 면세점 이벤트 전용</div>
                <div class="mms-rtitle">별보러가자</div>
                <div class="mms-badge">VIP 티켓 입장 교환권</div>
              </div>
            </div>
          </div>
        </div>
        <div class="mms-label">${msg.time}</div>
      `;
      row.appendChild(block);
    } else {
      const b = document.createElement('div');
      b.className = `bubble ${msg.type}`;
      b.innerHTML = msg.text.replace(/\n/g,'<br>');
      b.addEventListener('touchstart',()=>b.style.transform='scale(0.95)',{passive:true});
      b.addEventListener('touchend',()=>b.style.transform='');
      const t = document.createElement('div');
      t.className = 'btime';
      t.textContent = msg.time;
      if (msg.type==='sent') { row.appendChild(t); row.appendChild(b); }
      else { row.appendChild(b); row.appendChild(t); }
    }
    chat.appendChild(row);
  });
  chat.scrollTop = chat.scrollHeight;
}

// ── SEND ──
function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  const now = new Date();
  const h = now.getHours(), m = String(now.getMinutes()).padStart(2,'0');
  const ap = h>=12?'午後':'午前';
  const hr = h>12?h-12:h===0?12:h;
  state.messages.push({ id:state.nextId++, type:'sent', text, time:`${ap} ${hr}:${m}`, faded:false });
  input.value=''; input.style.height='auto';
  renderSMS();
  // animate last bubble
  const bubbles = document.querySelectorAll('.bubble-row');
  const last = bubbles[bubbles.length-1];
  if(last) { last.classList.add('new'); setTimeout(()=>last.classList.remove('new'),400); }
}

document.getElementById('msgInput').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,120)+'px';
});
document.getElementById('msgInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
});

// ── INIT ──
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
showSMS();
</script>
</body>
</html>
